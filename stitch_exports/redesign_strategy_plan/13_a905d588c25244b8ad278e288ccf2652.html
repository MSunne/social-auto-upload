<!DOCTYPE html>

<html class="dark" lang="zh"><head>

            darkMode: "class",

                        "secondary": "#00f2ff",

<style>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<!-- Mock Background: OmniBull Account Management Screen (Dimmed) -->
<div class="fixed inset-0 z-0 opacity-40 grayscale-[0.5]">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between border-b border-primary/20 px-10 py-3 bg-surface-dark">
<div class="flex items-center gap-4 text-white">
<span class="material-symbols-outlined text-primary text-3xl">token</span>
<h2 class="text-white text-lg font-bold">OmniBull</h2>
</div>
<div class="flex gap-4">
<div class="w-10 h-10 rounded-full bg-primary/20 border border-primary/40"></div>
</div>
</header>
<main class="p-10">
<div class="grid grid-cols-3 gap-6">
<div class="h-40 rounded-xl bg-surface-dark border border-primary/10"></div>
<div class="h-40 rounded-xl bg-surface-dark border border-primary/10"></div>
<div class="h-40 rounded-xl bg-surface-dark border border-primary/10"></div>
<div class="col-span-3 h-96 rounded-xl bg-surface-dark border border-primary/10"></div>

</div>

<div>

<div class="flex flex-col gap-2">

</div>
<div class="w-10 h-10 rounded-lg bg-secondary/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-secondary">light_mode</span>
</div>
</label>
<!-- Skill Item 3: Particle Transitions -->
<label class="flex items-start gap-4 p-4 rounded-xl bg-primary/5 border border-primary/10 hover:border-primary/40 cursor-pointer transition-all group">
<input class="mt-1 w-5 h-5 text-primary bg-background-dark border-primary/30 focus:ring-primary focus:ring-offset-background-dark" name="skill" type="radio"/>

<div class="flex flex-col gap-2">
<div class="flex items-center gap-2">

</div>
</div>
</div>
<div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">auto_awesome</span>
</div>
</label></div>
</section>
<!-- Execution Settings -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-secondary uppercase tracking-wider neon-text-cyan">执行时间 (Execution Time)</label>
<button class="flex items-center gap-1 text-xs text-primary hover:text-primary/80 transition-colors font-bold">
<span class="material-symbols-outlined text-sm">add_circle</span>
                            添加时间点 (Add Slot)
                        </button>
</div>
<div class="flex flex-wrap gap-3">
<div class="flex items-center gap-2 bg-primary/10 border border-primary/30 px-3 py-2 rounded-lg">
<span class="material-symbols-outlined text-sm text-primary">schedule</span>
<input class="bg-transparent border-none p-0 text-white focus:ring-0 text-sm" type="time" value="09:00"/>
<button class="text-slate-500 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<div class="flex items-center gap-2 bg-primary/10 border border-primary/30 px-3 py-2 rounded-lg">
<span class="material-symbols-outlined text-sm text-primary">schedule</span>
<input class="bg-transparent border-none p-0 text-white focus:ring-0 text-sm" type="time" value="18:30"/>
<button class="text-slate-500 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
<!-- Repeat Option -->
<div class="flex items-center justify-between p-4 rounded-xl bg-surface-dark border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">event_repeat</span>
<div>
<h4 class="text-white font-medium">每天重复 (Repeat Daily)</h4>
<p class="text-slate-500 text-xs">Execute this task automatically every day</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>

<button class="px-6 py-2.5 rounded-lg text-slate-300 font-bold hover:bg-white/5 transition-all text-sm">

<button class="px-8 py-2.5 rounded-lg bg-primary text-white font-bold hover:bg-primary/90 transition-all shadow-[0_0_15px_rgba(157,37,244,0.4)] text-sm">
