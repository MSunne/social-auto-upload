<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9d25f4",
                        "neon-green": "#39ff14",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0a0510",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(26, 16, 34, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(157, 37, 244, 0.3);
        }
        .neon-border-purple {
            box-shadow: 0 0 15px rgba(157, 37, 244, 0.4);
        }
        .neon-border-green:focus-within {
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            border-color: #39ff14;
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(157, 37, 244, 0.6);
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">
<div class="fixed inset-0 bg-background-dark/90 z-0">
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 20% 30%, #9d25f4 0%, transparent 50%), radial-gradient(circle at 80% 70%, #39ff14 0%, transparent 50%);"></div>
</div>
<div class="relative z-10 w-full max-w-2xl glass-effect rounded-xl overflow-hidden shadow-2xl border-t border-l border-white/10 neon-border-purple">
<div class="p-6 border-b border-white/10 flex justify-between items-center">
<div>
<h2 class="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-primary to-neon-green">添加新技能</h2>
<p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Knowledge Management &amp; Skill Acquisition System</p>
</div>
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-8 space-y-6 overflow-y-auto max-h-[60vh] scrollbar-thin scrollbar-thumb-primary/20">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">技能名称</label>
<div class="relative">
<input class="w-full bg-background-dark/50 border border-primary/30 rounded-lg py-3 px-4 text-white placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-neon-green/50 focus:border-neon-green transition-all" placeholder="输入核心技能名称..." type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">参考资料 (图片)</label>
<div class="h-40 border-2 border-dashed border-primary/20 bg-primary/5 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-primary/10 hover:border-primary/40 transition-all group">
<div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-lg hidden" data-alt="技能参考图片预览" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCpDKcp981qVN5Qr2eFhWUV6EkNfVoPdx5Q6GgeCtVnZPY118kNUaBSHD1j3GtkCpO0pDcrsaYgNOAitRn6JmNr-YoaQdkVKcv5iFXNpJGDG0GonyXhLaLB7Joos1edOytHn8gxMg8V8hClvPC2z4-JMp9Y5_zHrd0nUhCR9X1zVNv7BYPM-2kmEwQQAWSGmNhl1-FMO8f3n6FyLuGHXfDroT2PFnsKsW8kdRdlUlJpl9EArkm2X8dCKyH_GUTUUdmoHIoN17BQiA');"></div>
<span class="material-symbols-outlined text-primary text-4xl mb-2 group-hover:scale-110 transition-transform">cloud_upload</span>
<p class="text-xs text-slate-400">点击或拖拽上传图片</p>
</div>
</div>
<div class="space-y-2 flex flex-col">
<label class="text-sm font-medium text-slate-300 ml-1">参考文本</label>
<textarea class="flex-1 w-full bg-background-dark/50 border border-primary/30 rounded-lg py-3 px-4 text-white placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-neon-green/50 focus:border-neon-green transition-all resize-none" placeholder="粘贴相关参考代码或文档片段..."></textarea>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">技能详细描述</label>
<textarea class="w-full bg-background-dark/50 border border-primary/30 rounded-lg py-3 px-4 text-white placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-neon-green/50 focus:border-neon-green transition-all" placeholder="详细定义技能的工作原理与应用场景..." rows="3"></textarea>
</div>
<div class="space-y-3 peer">
<label class="text-sm font-medium text-slate-300 ml-1">输出格式</label>
<div class="grid grid-cols-2 gap-4">
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="format" type="radio" value="image"/>
<div class="flex items-center gap-3 p-4 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-neon-green peer-checked:bg-neon-green/5 transition-all">
<span class="material-symbols-outlined text-neon-green">image</span>
<span class="text-sm font-medium">图文模式 (Image + Text)</span>
</div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="format" type="radio" value="video"/>
<div class="flex items-center gap-3 p-4 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-primary">videocam</span>
<span class="text-sm font-medium">视文模式 (Video + Text)</span>
</div>
</label>
</div><div class="hidden peer-checked:[&amp;:has(input[value='image']:checked)~*]:block mt-4 space-y-4" id="image-models-container">
<p class="text-xs font-semibold text-neon-green/80 uppercase tracking-wider ml-1">选择图像生成模型</p>
<div class="grid grid-cols-3 gap-3">
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="image-model" type="radio"/>
<div class="p-3 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-neon-green peer-checked:bg-neon-green/5 transition-all text-center h-full flex flex-col justify-between">
<div><span class="block text-sm font-bold text-white">Midjourney v6</span><p class="text-[10px] text-slate-300 mt-1 leading-tight">艺术画质与超写实表现</p></div>
<span class="block text-[10px] font-mono text-neon-green mt-2 bg-neon-green/10 py-0.5 rounded px-1">计费: 2.0 点数/生成</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="image-model" type="radio"/>
<div class="p-3 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-neon-green peer-checked:bg-neon-green/5 transition-all text-center h-full flex flex-col justify-between">
<div><span class="block text-sm font-bold text-white">DALL-E 3</span><p class="text-[10px] text-slate-300 mt-1 leading-tight">精准语义理解与构图</p></div>
<span class="block text-[10px] font-mono text-neon-green mt-2 bg-neon-green/10 py-0.5 rounded px-1">计费: 1.5 点数/生成</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="image-model" type="radio"/>
<div class="p-3 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-neon-green peer-checked:bg-neon-green/5 transition-all text-center h-full flex flex-col justify-between">
<div><span class="block text-sm font-bold text-white">SDXL</span><p class="text-[10px] text-slate-300 mt-1 leading-tight">开源灵活性与快速生成</p></div>
<span class="block text-[10px] font-mono text-neon-green mt-2 bg-neon-green/10 py-0.5 rounded px-1">计费: 1.0 点数/生成</span>
</div>
</label>
</div>
</div><div class="hidden peer-checked:[&amp;:has(input[value='video']:checked)~*]:block mt-4 space-y-4" id="video-models-container">
<p class="text-xs font-semibold text-primary/80 uppercase tracking-wider ml-1">选择视频生成模型</p>
<div class="grid grid-cols-3 gap-3">
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="video-model" type="radio"/>
<div class="p-3 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-primary peer-checked:bg-primary/5 transition-all text-center h-full flex flex-col justify-between">
<div><span class="block text-sm font-bold text-white">Sora</span><p class="text-[10px] text-slate-300 mt-1 leading-tight">复杂场景与物理引擎模拟</p></div>
<span class="block text-[10px] font-mono text-primary mt-2 bg-primary/10 py-0.5 rounded px-1">计费: 10.0 点数/生成</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="video-model" type="radio"/>
<div class="p-3 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-primary peer-checked:bg-primary/5 transition-all text-center h-full flex flex-col justify-between">
<div><span class="block text-sm font-bold text-white">Runway Gen-3</span><p class="text-[10px] text-slate-300 mt-1 leading-tight">电影级视觉控制力</p></div>
<span class="block text-[10px] font-mono text-primary mt-2 bg-primary/10 py-0.5 rounded px-1">计费: 8.0 点数/生成</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="video-model" type="radio"/>
<div class="p-3 rounded-lg bg-background-dark/40 border border-white/5 peer-checked:border-primary peer-checked:bg-primary/5 transition-all text-center h-full flex flex-col justify-between">
<div><span class="block text-sm font-bold text-white">Luma Dream</span><p class="text-[10px] text-slate-300 mt-1 leading-tight">极速渲染与动作捕捉</p></div>
<span class="block text-[10px] font-mono text-primary mt-2 bg-primary/10 py-0.5 rounded px-1">计费: 5.0 点数/生成</span>
</div>
</label>
</div>
</div>
</div>
</div>
<div class="p-6 bg-white/5 border-t border-white/10 flex flex-row-reverse gap-4">
<button class="px-8 py-3 bg-primary text-white font-bold rounded-lg glow-button hover:bg-primary/80 transition-all flex items-center gap-2">
<span>确认添加</span>
<span class="material-symbols-outlined text-sm">bolt</span>
</button>
<button class="px-8 py-3 border border-slate-700 text-slate-400 font-medium rounded-lg hover:bg-white/5 transition-all">
                取消操作
            </button>
</div>
</div>
</body></html>
