<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫码登录</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 36%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.16), transparent 30%),
        #f4f7fb;
      color: #111827;
    }
    .panel {
      width: min(92vw, 720px);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 28px 24px 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
      text-align: center;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    .meta {
      margin: 0 0 18px;
      color: #4b5563;
      font-size: 14px;
    }
    .status {
      margin: 0 0 16px;
      font-size: 15px;
      font-weight: 600;
    }
    .message {
      min-height: 22px;
      margin: 0 0 18px;
      color: #4b5563;
      font-size: 14px;
    }
    .success {
      color: #166534;
    }
    .failed {
      color: #991b1b;
    }
    .wait {
      color: #92400e;
    }
    .stack {
      display: grid;
      gap: 18px;
    }
    .card {
      border-radius: 20px;
      border: 1px solid #dbe3f5;
      background: linear-gradient(145deg, #ffffff, #eef3ff);
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .qr-shell,
    .verify-shell {
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .qr-shell {
      width: 260px;
      height: 260px;
      margin: 0 auto;
      border-radius: 24px;
      border: 1px solid #dbe3f5;
      background: #fff;
    }
    .verify-shell {
      width: 100%;
    }
    .qr-image {
      width: 220px;
      height: 220px;
      object-fit: contain;
      display: none;
      background: #fff;
      border-radius: 16px;
    }
    .verify-image {
      width: min(100%, 620px);
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      object-fit: contain;
      background: #fff;
      display: none;
    }
    .placeholder {
      width: 180px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }
    .hidden {
      display: none !important;
    }
    .option-grid {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .option-button,
    .submit-button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .option-button.secondary {
      background: #0f766e;
    }
    .input-group {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      text-align: left;
    }
    .assist-input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      padding: 12px 14px;
      font-size: 14px;
    }
    .assist-help {
      color: #6b7280;
      font-size: 13px;
      text-align: left;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">REMOTE LOGIN</div>
    <h1>{{ session.platform }} 扫码登录</h1>
    <p class="meta">{{ session.accountName }} · {{ session.deviceName }}</p>
    <p id="status" class="status">当前状态：{{ session.status }}</p>
    <p id="message" class="message">{{ session.message or '等待本地 agent 返回二维码' }}</p>

    <div class="stack">
      <section id="qrSection" class="card">
        <h2>二维码</h2>
        <div class="qr-shell">
          <img id="qrImage" class="qr-image" src="{{ session.qrData or '' }}" alt="二维码">
          <div id="placeholder" class="placeholder">等待本地 agent 生成二维码并同步到云端</div>
        </div>
      </section>

      <section id="verifySection" class="card hidden">
        <h2 id="verifyTitle">需要额外验证</h2>
        <p id="verifyHint" class="assist-help">本地浏览器检测到额外验证，本页会同步当前验证界面与可选操作。</p>
        <div class="verify-shell">
          <img id="verifyImage" class="verify-image" alt="验证界面">
        </div>
        <div id="verifyOptions" class="option-grid"></div>
        <div class="input-group">
          <input id="assistInput" class="assist-input" placeholder="输入验证码、短信验证码或登录密码">
          <button id="sendInputButton" class="submit-button secondary" type="button">发送到本地验证框</button>
          <button id="sendAndSubmitButton" class="submit-button secondary" type="button">发送验证码并提交</button>
          <button id="pressEnterButton" class="submit-button" type="button">发送回车</button>
        </div>
        <div id="inputHints" class="assist-help"></div>
      </section>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status')
    const messageEl = document.getElementById('message')
    const qrSectionEl = document.getElementById('qrSection')
    const qrImageEl = document.getElementById('qrImage')
    const placeholderEl = document.getElementById('placeholder')
    const verifySectionEl = document.getElementById('verifySection')
    const verifyTitleEl = document.getElementById('verifyTitle')
    const verifyHintEl = document.getElementById('verifyHint')
    const verifyImageEl = document.getElementById('verifyImage')
    const verifyOptionsEl = document.getElementById('verifyOptions')
    const assistInputEl = document.getElementById('assistInput')
    const sendInputButtonEl = document.getElementById('sendInputButton')
    const sendAndSubmitButtonEl = document.getElementById('sendAndSubmitButton')
    const pressEnterButtonEl = document.getElementById('pressEnterButton')
    const inputHintsEl = document.getElementById('inputHints')

    let latestSession = {{ session | tojson }}

    function setStatusClass(status) {
      statusEl.className = 'status'
      if (status === 'success') statusEl.classList.add('success')
      if (status === 'failed') statusEl.classList.add('failed')
      if (status === 'waiting_scan' || status === 'waiting_verify') statusEl.classList.add('wait')
    }

    async function sendAction(actionType, payload) {
      const response = await fetch('{{ url_for("create_viewer_action", viewer_token=session.viewerToken) }}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          actionType,
          payload,
        }),
      })
      const result = await response.json()
      if (result.code !== 200) {
        throw new Error(result.msg || '发送远端操作失败')
      }
      messageEl.textContent = '远端操作已发送到本地浏览器，请稍候页面同步最新状态'
    }

    function renderVerification(session) {
      const verificationData = session.verificationData
      if (!verificationData) {
        verifySectionEl.classList.add('hidden')
        return
      }

      verifySectionEl.classList.remove('hidden')
      verifyTitleEl.textContent = verificationData.title || '需要额外验证'
      verifyHintEl.textContent = verificationData.message || '请在本页协助本地浏览器完成验证'

      if (verificationData.screenshotData) {
        verifyImageEl.src = verificationData.screenshotData
        verifyImageEl.style.display = 'block'
      } else {
        verifyImageEl.style.display = 'none'
      }

      verifyOptionsEl.innerHTML = ''
      const options = verificationData.options || []
      options.forEach((optionText) => {
        const button = document.createElement('button')
        button.type = 'button'
        button.className = 'option-button'
        button.textContent = optionText
        button.addEventListener('click', () => {
          sendAction('select_option', { text: optionText }).catch((error) => {
            messageEl.textContent = error.message
          })
        })
        verifyOptionsEl.appendChild(button)
      })

      const hints = verificationData.inputHints || []
      if (verificationData.supportsTextInput || hints.length) {
        inputHintsEl.textContent = hints.length
          ? `本地检测到输入框：${hints.join(' / ')}`
          : '本地检测到验证输入框，可直接把验证码或密码发送到本地浏览器'
      } else {
        inputHintsEl.textContent = '如果验证界面出现输入框，本页也可以继续发送验证码或密码'
      }
    }

    function applySession(session) {
      if (!session) return
      latestSession = session

      statusEl.textContent = `当前状态：${session.status}`
      setStatusClass(session.status)
      messageEl.textContent = session.message || ''

      if (session.qrData) {
        qrImageEl.src = session.qrData
        qrImageEl.style.display = 'block'
        placeholderEl.style.display = 'none'
      } else {
        qrImageEl.style.display = 'none'
        placeholderEl.style.display = 'block'
      }

      renderVerification(session)
    }

    sendInputButtonEl.addEventListener('click', () => {
      const text = assistInputEl.value.trim()
      if (!text) {
        messageEl.textContent = '先输入验证码或密码'
        return
      }
      sendAction('fill_text', { text }).catch((error) => {
        messageEl.textContent = error.message
      })
    })

    pressEnterButtonEl.addEventListener('click', () => {
      sendAction('press_key', { key: 'Enter' }).catch((error) => {
        messageEl.textContent = error.message
      })
    })

    sendAndSubmitButtonEl.addEventListener('click', () => {
      const text = assistInputEl.value.trim()
      if (!text) {
        messageEl.textContent = '先输入验证码或密码'
        return
      }
      sendAction('fill_text_and_submit', { text }).catch((error) => {
        messageEl.textContent = error.message
      })
    })

    fetch('{{ state_url }}')
      .then(response => response.json())
      .then(result => applySession(result.data))
      .catch(() => {})

    const eventSource = new EventSource('{{ stream_url }}')
    eventSource.onmessage = (event) => {
      const payload = JSON.parse(event.data)
      applySession(payload.session)

      if (payload.type === 'login_success' || payload.type === 'login_failed') {
        eventSource.close()
      }
    }

    applySession(latestSession)
  </script>
</body>
</html>
