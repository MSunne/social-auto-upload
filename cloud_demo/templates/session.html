<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫码登录</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 36%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.16), transparent 30%),
        #f4f7fb;
      color: #111827;
    }
    .panel {
      width: min(92vw, 460px);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 28px 24px 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
      text-align: center;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    .meta {
      margin: 0 0 18px;
      color: #4b5563;
      font-size: 14px;
    }
    .status {
      margin: 0 0 16px;
      font-size: 15px;
      font-weight: 600;
    }
    .message {
      min-height: 22px;
      margin: 0 0 18px;
      color: #4b5563;
      font-size: 14px;
    }
    .qr-shell {
      width: 260px;
      height: 260px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #ffffff, #eef3ff);
      border: 1px solid #dbe3f5;
      overflow: hidden;
    }
    .qr-image {
      width: 220px;
      height: 220px;
      object-fit: contain;
      display: none;
      background: #fff;
      border-radius: 16px;
    }
    .placeholder {
      width: 180px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }
    .success {
      color: #166534;
    }
    .failed {
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">REMOTE LOGIN</div>
    <h1>{{ session.platform }} 扫码登录</h1>
    <p class="meta">{{ session.accountName }} · {{ session.deviceName }}</p>
    <p id="status" class="status">当前状态：{{ session.status }}</p>
    <p id="message" class="message">{{ session.message or '等待本地 agent 返回二维码' }}</p>
    <div class="qr-shell">
      <img id="qrImage" class="qr-image" src="{{ session.qrData or '' }}" alt="二维码">
      <div id="placeholder" class="placeholder">等待本地 agent 生成二维码并同步到云端</div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status')
    const messageEl = document.getElementById('message')
    const qrImageEl = document.getElementById('qrImage')
    const placeholderEl = document.getElementById('placeholder')

    function applySession(session) {
      if (!session) return

      statusEl.textContent = `当前状态：${session.status}`
      statusEl.className = 'status'
      if (session.status === 'success') statusEl.classList.add('success')
      if (session.status === 'failed') statusEl.classList.add('failed')

      messageEl.textContent = session.message || ''

      if (session.qrData) {
        qrImageEl.src = session.qrData
        qrImageEl.style.display = 'block'
        placeholderEl.style.display = 'none'
      }
    }

    fetch('{{ state_url }}')
      .then(response => response.json())
      .then(result => applySession(result.data))
      .catch(() => {})

    const eventSource = new EventSource('{{ stream_url }}')
    eventSource.onmessage = (event) => {
      const payload = JSON.parse(event.data)
      applySession(payload.session)

      if (payload.type === 'login_success' || payload.type === 'login_failed') {
        eventSource.close()
      }
    }
  </script>
</body>
</html>
