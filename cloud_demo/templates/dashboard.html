<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud QR Demo</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1, h2 {
      margin: 0 0 16px;
    }
    .tip {
      margin: 0 0 24px;
      color: #4b5563;
    }
    .meta {
      margin-top: 8px;
      color: #6b7280;
      font-size: 13px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #6b7280;
      font-weight: 600;
    }
    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-ok {
      background: #dcfce7;
      color: #166534;
    }
    .status-wait {
      background: #fef3c7;
      color: #92400e;
    }
    .status-fail {
      background: #fee2e2;
      color: #991b1b;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    .muted {
      color: #6b7280;
    }
    .empty {
      color: #6b7280;
      padding: 12px 0;
    }
    .form-grid {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }
    .control {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      font-size: 14px;
    }
    .button {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .button:disabled,
    .control:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Cloud QR Demo</h1>
    <p class="tip">本页展示设备、账号、登录任务与发布任务镜像状态，并支持直接对在线设备下发扫码登录任务。</p>

    <div class="card">
      <h2>在线设备与新建任务</h2>
      <div id="devicesPanel"></div>
      <form action="{{ url_for('create_task_from_dashboard') }}" method="post" class="form-grid">
        <select id="deviceName" name="deviceName" required class="control"></select>
        <select name="platform" required class="control">
          <option value="抖音">抖音</option>
          <option value="视频号">视频号</option>
          <option value="快手">快手</option>
          <option value="小红书">小红书</option>
        </select>
        <input name="accountName" placeholder="输入账号名称" required class="control">
        <button id="submitButton" type="submit" class="button">发起扫码登录</button>
      </form>
      <div id="devicesMeta" class="meta"></div>
    </div>

    <div class="card">
      <h2>账号状态镜像</h2>
      <div id="accountsPanel"></div>
    </div>

    <div class="card">
      <h2>最近发布任务</h2>
      <div id="publishTasksPanel"></div>
    </div>

    <div class="card">
      <h2>最近登录任务</h2>
      <div id="tasksPanel"></div>
    </div>
  </div>

  <script>
    const dashboardState = {{ snapshot | tojson }};
    const devicesPanel = document.getElementById('devicesPanel');
    const accountsPanel = document.getElementById('accountsPanel');
    const publishTasksPanel = document.getElementById('publishTasksPanel');
    const tasksPanel = document.getElementById('tasksPanel');
    const deviceSelect = document.getElementById('deviceName');
    const submitButton = document.getElementById('submitButton');
    const devicesMeta = document.getElementById('devicesMeta');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function statusClass(status) {
      if (status === 'online' || status === '正常' || status === 'success') {
        return 'status-ok';
      }
      if (status === 'waiting_scan' || status === 'waiting_verify' || status === 'running' || status === 'pending' || status === 'scheduled' || status === 'needs_verify' || status === '等待扫码' || status === '等待验证') {
        return 'status-wait';
      }
      return 'status-fail';
    }

    function renderDevices(devices) {
      if (!devices.length) {
        devicesPanel.innerHTML = '<div class="empty">还没有在线设备。先在本地把 `CLOUD_AGENT_ENABLED` 改为 True，再启动本地后端。</div>';
      } else {
        devicesPanel.innerHTML = `
          <table>
            <thead>
            <tr>
              <th>设备</th>
              <th>设备码</th>
              <th>在线状态</th>
              <th>本地 IP</th>
              <th>公网 IP</th>
              <th>最近心跳</th>
            </tr>
          </thead>
          <tbody>
              ${devices.map((row) => `
                <tr>
                  <td>${escapeHtml(row.deviceName)}</td>
                  <td class="muted">${escapeHtml(row.deviceCode || '-')}</td>
                  <td><span class="status ${statusClass(row.status)}">${escapeHtml(row.status)}</span></td>
                  <td class="muted">${escapeHtml(row.localIp || '-')}</td>
                  <td class="muted">${escapeHtml(row.publicIp || '-')}</td>
                  <td class="muted">${escapeHtml(row.lastSeen || '-')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      deviceSelect.innerHTML = '';
      const onlineDevices = devices.filter((row) => row.status === 'online');
      const sourceDevices = onlineDevices.length ? onlineDevices : devices;

      if (!sourceDevices.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '暂无可用设备';
        deviceSelect.appendChild(option);
        deviceSelect.disabled = true;
        submitButton.disabled = true;
      } else {
        sourceDevices.forEach((row) => {
          const option = document.createElement('option');
          option.value = row.deviceName;
          option.textContent = `${row.deviceName} (${row.status})`;
          deviceSelect.appendChild(option);
        });
        deviceSelect.disabled = false;
        submitButton.disabled = false;
      }

      devicesMeta.textContent = `最后刷新: ${new Date().toLocaleString()}`;
    }

    function renderAccounts(accounts) {
      if (!accounts.length) {
        accountsPanel.innerHTML = '<div class="empty">还没有账号同步记录。</div>';
        return;
      }

      accountsPanel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>设备</th>
              <th>平台</th>
              <th>账号</th>
              <th>状态</th>
              <th>说明</th>
              <th>更新时间</th>
            </tr>
          </thead>
          <tbody>
            ${accounts.map((row) => `
              <tr>
                <td>${escapeHtml(row.deviceName)}</td>
                <td>${escapeHtml(row.platform)}</td>
                <td>${escapeHtml(row.accountName)}</td>
                <td><span class="status ${statusClass(row.status)}">${escapeHtml(row.status)}</span></td>
                <td class="muted">${escapeHtml(row.lastMessage || '-')}</td>
                <td class="muted">${escapeHtml(row.updatedAt || '-')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderTasks(tasks) {
      if (!tasks.length) {
        tasksPanel.innerHTML = '<div class="empty">还没有登录任务。</div>';
        return;
      }

      tasksPanel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>设备</th>
              <th>平台</th>
              <th>账号</th>
              <th>状态</th>
              <th>查看页</th>
              <th>更新时间</th>
            </tr>
          </thead>
          <tbody>
            ${tasks.map((row) => `
              <tr>
                <td>${escapeHtml(row.deviceName)}</td>
                <td>${escapeHtml(row.platform)}</td>
                <td>${escapeHtml(row.accountName)}</td>
                <td><span class="status ${statusClass(row.status)}">${escapeHtml(row.status)}</span></td>
                <td>${row.viewerUrl ? `<a href="${escapeHtml(row.viewerUrl)}" target="_blank">打开</a>` : '-'}</td>
                <td class="muted">${escapeHtml(row.updatedAt || '-')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderPublishTasks(tasks) {
      if (!tasks.length) {
        publishTasksPanel.innerHTML = '<div class="empty">还没有发布任务镜像。</div>';
        return;
      }

      publishTasksPanel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>设备</th>
              <th>平台</th>
              <th>账号</th>
              <th>作品</th>
              <th>状态</th>
              <th>详情</th>
              <th>更新时间</th>
            </tr>
          </thead>
          <tbody>
            ${tasks.map((row) => `
              <tr>
                <td>${escapeHtml(row.deviceName)}</td>
                <td>${escapeHtml(row.platform)}</td>
                <td>${escapeHtml(row.accountName)}</td>
                <td>
                  <div>${escapeHtml(row.title)}</div>
                  <div class="muted">${escapeHtml(row.fileName || row.filePath || '-')}</div>
                </td>
                <td><span class="status ${statusClass(row.status)}">${escapeHtml(row.status)}</span></td>
                <td><a href="/p/${encodeURIComponent(row.taskUuid)}" target="_blank">打开</a></td>
                <td class="muted">${escapeHtml(row.updatedAt || '-')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderSnapshot(snapshot) {
      renderDevices(snapshot.devices || []);
      renderAccounts(snapshot.accounts || []);
      renderPublishTasks(snapshot.publishTasks || []);
      renderTasks(snapshot.tasks || []);
    }

    async function refreshDashboard() {
      try {
        const response = await fetch('{{ url_for("api_dashboard") }}', { cache: 'no-store' });
        const payload = await response.json();
        if (payload.code === 200 && payload.data) {
          renderSnapshot(payload.data);
        }
      } catch (error) {
        devicesMeta.textContent = `刷新失败: ${error.message}`;
      }
    }

    renderSnapshot(dashboardState);
    window.setInterval(refreshDashboard, 3000);
  </script>
</body>
</html>
